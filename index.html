<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="fixed-page">
        <div id="scaled-container">
            <!-- Template for an event -->
            <div id="singleEventTemplate" class="event" style="display:none;">
                <img src="" class="image" />
                <div class="text-overlay">
                    <p class="cost"></p>
                    <p class="time"></p>
                    <hr>
                    <p class="title"></p>
                    <p class="location"></p>
                    <p class="standFirstCopy"></p>
                </div>
                <!-- ✅ Optional QR overlay -->
                <div class="qr-overlay" style="display:none;">
                    <img class="qr-image" src="" alt="QR Code">
                    <p class="qr-text"></p>
                    
                </div>
            </div>
        </div>
    </div>
    </div>
    <div id="perf-overlay"></div>
    <div id="logPanel"
        style="position:fixed; bottom:0; left:0; width:100%; max-height:200px; overflow-y:auto; background:rgba(0,0,0,0.7); color:#fff; font-family:monospace; font-size:12px; z-index:10000;">
    </div>

    <script src="script.js"></script>
</body>

</html>
